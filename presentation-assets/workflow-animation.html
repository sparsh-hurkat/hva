<title>The New Workflow — Consolidation</title>

<style>
  :root {
    --ink: #f5f1e6;
    --ink-raised: #ffffff;
    --text: #17203a;
    --text-muted: #5b6478;
    --rail: #17203a;
    --rail-glow: rgba(23, 32, 58, 0.22);
    --accent: #a9761e;
    --critical: #d03b3b;
    --resolved: #0ca30c;
    --grid-line: rgba(23, 32, 58, 0.07);
    --font-display: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #0b1220;
      --ink-raised: #141d33;
      --text: #eef1f6;
      --text-muted: #8b97ad;
      --rail: #f2b134;
      --rail-glow: rgba(242, 177, 52, 0.4);
      --accent: #f2b134;
      --critical: #e2483d;
      --resolved: #22c55e;
      --grid-line: rgba(255, 255, 255, 0.06);
    }
  }
  :root[data-theme="dark"] {
    --ink: #0b1220; --ink-raised: #141d33; --text: #eef1f6; --text-muted: #8b97ad;
    --rail: #f2b134; --rail-glow: rgba(242, 177, 52, 0.4); --accent: #f2b134;
    --critical: #e2483d; --resolved: #22c55e; --grid-line: rgba(255, 255, 255, 0.06);
  }
  :root[data-theme="light"] {
    --ink: #f5f1e6; --ink-raised: #ffffff; --text: #17203a; --text-muted: #5b6478;
    --rail: #17203a; --rail-glow: rgba(23, 32, 58, 0.22); --accent: #a9761e;
    --critical: #d03b3b; --resolved: #0ca30c; --grid-line: rgba(23, 32, 58, 0.07);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--ink);
    font-family: var(--font-display);
    overflow-x: hidden;
  }

  .stage-wrap { width: 100%; max-width: 1600px; padding: 24px; }

  .scene {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--ink);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
  }

  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .countdown {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--ink); z-index: 50;
    animation: countdownOut 0.6s ease 2.6s forwards;
  }
  .countdown span {
    font-family: var(--font-mono); font-size: clamp(48px, 9vw, 120px); font-weight: 600;
    color: var(--text); position: absolute; opacity: 0;
  }
  .countdown .n1 { animation: tickShow 0.9s ease 0s forwards; }
  .countdown .n2 { animation: tickShow 0.9s ease 0.9s forwards; }
  .countdown .n3 { animation: tickShow 0.9s ease 1.8s forwards; }
  @keyframes tickShow {
    0% { opacity: 0; transform: scale(1.4); }
    15% { opacity: 1; transform: scale(1); }
    85% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.9); }
  }
  @keyframes countdownOut { to { opacity: 0; visibility: hidden; } }

  .header {
    position: absolute; top: 3%; left: 4%; z-index: 5; opacity: 0;
    animation: fadeUp 0.9s ease 3.1s forwards;
  }
  .eyebrow {
    display: block; font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.18em;
    color: var(--accent); margin-bottom: 6px;
  }
  h1 { margin: 0; font-size: clamp(18px, 2.2vw, 28px); font-weight: 700; color: var(--text); letter-spacing: -0.01em; text-wrap: balance; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .restart {
    position: absolute; bottom: 2.5%; right: 2.5%; z-index: 30;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; color: var(--text-muted);
    background: var(--ink-raised); border: 1px solid var(--grid-line); border-radius: 3px;
    padding: 6px 10px; cursor: pointer; opacity: 0; animation: fadeUp 0.6s ease 3.6s forwards;
  }
  .restart:hover { border-color: var(--accent); color: var(--accent); }
  .restart:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---- chaos panels ---- */
  .chaos-panel {
    position: absolute;
    width: 150px;
    z-index: 3;
    opacity: 0;
  }
  .win {
    background: var(--ink-raised);
    border: 1px solid var(--grid-line);
    border-radius: 5px;
    box-shadow: 0 10px 22px rgba(0, 0, 0, 0.14);
    overflow: hidden;
  }
  .win-header {
    display: flex; gap: 4px; align-items: center;
    padding: 6px 8px; background: var(--grid-line);
  }
  .win-header span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); opacity: 0.6; }
  .win-body { padding: 12px 10px; text-align: center; font-size: 13px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); }

  .wiggle { animation: wiggle 1.7s ease-in-out infinite; transform-origin: center; }
  @keyframes wiggle {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(2.2deg); }
  }

  @keyframes chaosAdo {
    0%   { opacity: 0; left: 15.15%; top: 15.38%; transform: rotate(-7deg) scale(0.6); }
    10%  { opacity: 1; left: 15.15%; top: 15.38%; transform: rotate(-7deg) scale(1); }
    85%  { opacity: 1; left: 15.15%; top: 15.38%; transform: rotate(-7deg) scale(1); }
    100% { opacity: 0; left: 75.76%; top: 24.62%; transform: rotate(0deg) scale(0.25); }
  }
  @keyframes chaosMend {
    0%   { opacity: 0; left: 30.3%; top: 13.85%; transform: rotate(5deg) scale(0.6); }
    10%  { opacity: 1; left: 30.3%; top: 13.85%; transform: rotate(5deg) scale(1); }
    85%  { opacity: 1; left: 30.3%; top: 13.85%; transform: rotate(5deg) scale(1); }
    100% { opacity: 0; left: 75.76%; top: 24.62%; transform: rotate(0deg) scale(0.25); }
  }
  @keyframes chaosFortify {
    0%   { opacity: 0; left: 12.99%; top: 32.31%; transform: rotate(9deg) scale(0.6); }
    10%  { opacity: 1; left: 12.99%; top: 32.31%; transform: rotate(9deg) scale(1); }
    85%  { opacity: 1; left: 12.99%; top: 32.31%; transform: rotate(9deg) scale(1); }
    100% { opacity: 0; left: 75.76%; top: 24.62%; transform: rotate(0deg) scale(0.25); }
  }
  @keyframes chaosWiz {
    0%   { opacity: 0; left: 32.47%; top: 34.62%; transform: rotate(-6deg) scale(0.6); }
    10%  { opacity: 1; left: 32.47%; top: 34.62%; transform: rotate(-6deg) scale(1); }
    85%  { opacity: 1; left: 32.47%; top: 34.62%; transform: rotate(-6deg) scale(1); }
    100% { opacity: 0; left: 75.76%; top: 24.62%; transform: rotate(0deg) scale(0.25); }
  }
  @keyframes chaosJfrog {
    0%   { opacity: 0; left: 45.45%; top: 19.23%; transform: rotate(4deg) scale(0.6); }
    10%  { opacity: 1; left: 45.45%; top: 19.23%; transform: rotate(4deg) scale(1); }
    85%  { opacity: 1; left: 45.45%; top: 19.23%; transform: rotate(4deg) scale(1); }
    100% { opacity: 0; left: 75.76%; top: 24.62%; transform: rotate(0deg) scale(0.25); }
  }

  .p-ado     { animation: chaosAdo 4.5s ease-in 3.3s forwards; }
  .p-mend    { animation: chaosMend 4.5s ease-in 3.5s forwards; }
  .p-fortify { animation: chaosFortify 4.5s ease-in 3.7s forwards; }
  .p-wiz     { animation: chaosWiz 4.5s ease-in 3.9s forwards; }
  .p-jfrog   { animation: chaosJfrog 4.5s ease-in 4.1s forwards; }

  /* ---- dashboard (the consolidation target) ---- */
  .dashboard {
    position: absolute;
    left: 75.76%; top: 24.62%;
    transform: translate(-50%, -50%) scale(0);
    width: 280px;
    padding: 20px 22px;
    background: var(--ink-raised);
    border: 1px solid var(--grid-line);
    border-radius: 8px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
    text-align: center;
    opacity: 0;
    z-index: 6;
    animation: dashboardIn 1.7s cubic-bezier(.2,.8,.3,1.3) 7.1s forwards, dashboardGlow 3s ease-in-out 8.8s infinite;
  }
  @keyframes dashboardIn {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0); }
    70%  { opacity: 1; transform: translate(-50%, -50%) scale(1.06); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes dashboardGlow {
    0%, 100% { box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18), 0 0 0 rgba(0,0,0,0); }
    50%      { box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18), 0 0 26px var(--rail-glow); }
  }
  .dashboard .icon { width: 34px; height: 34px; color: var(--resolved); margin: 0 auto 10px; }
  .dashboard .icon svg { width: 100%; height: 100%; display: block; }
  .dashboard .label { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; color: var(--text); }

  /* ---- checklist ---- */
  .checklist {
    position: absolute;
    left: 50%; top: 54%;
    width: 46%;
    display: flex;
    flex-direction: column;
    gap: 14px;
    z-index: 5;
  }
  .check-item {
    display: flex; align-items: center; gap: 10px;
    opacity: 0;
    transform: translateY(10px);
  }
  .check-item .tick {
    width: 22px; height: 22px; flex-shrink: 0;
    border-radius: 50%;
    background: var(--resolved);
    display: flex; align-items: center; justify-content: center;
  }
  .check-item .tick svg { width: 13px; height: 13px; }
  .check-item span.text { font-size: 15px; font-weight: 600; color: var(--text); }

  @keyframes checkIn {
    to { opacity: 1; transform: translateY(0); }
  }
  .ci-1 { animation: checkIn 0.5s ease 9.3s forwards; }
  .ci-2 { animation: checkIn 0.5s ease 9.8s forwards; }
  .ci-3 { animation: checkIn 0.5s ease 10.3s forwards; }
  .ci-4 { animation: checkIn 0.5s ease 10.8s forwards; }

  /* ---- hero stat ---- */
  .hero-stat {
    position: absolute;
    left: 50%; top: 84%;
    width: 46%;
    transform: translateX(0);
    z-index: 5;
  }
  .hero-before {
    font-size: 15px;
    color: var(--text-muted);
    text-decoration: line-through;
    opacity: 0;
    animation: fadeUp 0.4s ease 11.3s forwards;
  }
  .hero-after {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-top: 4px;
    opacity: 0;
    animation: heroPop 0.6s cubic-bezier(.2,.8,.3,1.3) 11.9s forwards;
  }
  @keyframes heroPop {
    0%   { opacity: 0; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1); }
  }
  .hero-after .num {
    font-size: clamp(28px, 3.4vw, 46px);
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .hero-after .label {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 600;
  }

  /* Reduced motion */
  .reduced-motion .chaos-panel { display: none; }
  .reduced-motion .dashboard { animation: none; opacity: 1; transform: translate(-50%, -50%) scale(1); }
  .reduced-motion .check-item { animation: none; opacity: 1; transform: translateY(0); }
  .reduced-motion .hero-before, .reduced-motion .hero-after { animation: none; opacity: 1; transform: none; }
  .reduced-motion .header { opacity: 1; animation: none; }
  .reduced-motion .countdown { display: none; }
  .reduced-motion .restart { opacity: 1; animation: none; }
</style>

<div class="stage-wrap">
  <div class="scene" id="scene">
    <div class="grid-bg"></div>

    <div class="countdown"><span class="n1">3</span><span class="n2">2</span><span class="n3">1</span></div>

    <div class="header">
      <span class="eyebrow">THE NEW WORKFLOW</span>
      <h1>From five tools to one dashboard</h1>
    </div>

    <button class="restart" onclick="location.reload()">⟲ RESTART</button>

    <div class="chaos-panel p-ado">
      <div class="wiggle"><div class="win">
        <div class="win-header"><span></span><span></span><span></span></div>
        <div class="win-body">ADO</div>
      </div></div>
    </div>
    <div class="chaos-panel p-mend">
      <div class="wiggle"><div class="win">
        <div class="win-header"><span></span><span></span><span></span></div>
        <div class="win-body">MEND</div>
      </div></div>
    </div>
    <div class="chaos-panel p-fortify">
      <div class="wiggle"><div class="win">
        <div class="win-header"><span></span><span></span><span></span></div>
        <div class="win-body">FORTIFY</div>
      </div></div>
    </div>
    <div class="chaos-panel p-wiz">
      <div class="wiggle"><div class="win">
        <div class="win-header"><span></span><span></span><span></span></div>
        <div class="win-body">WIZ</div>
      </div></div>
    </div>
    <div class="chaos-panel p-jfrog">
      <div class="wiggle"><div class="win">
        <div class="win-header"><span></span><span></span><span></span></div>
        <div class="win-body">JFROG</div>
      </div></div>
    </div>

    <div class="dashboard">
      <div class="icon"><svg viewBox="0 0 28 28"><rect x="3" y="3" width="10" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="15" y="3" width="10" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="3" y="13" width="10" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="15" y="13" width="10" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>
      <div class="label">DASHBOARD</div>
    </div>

    <div class="checklist">
      <div class="check-item ci-1">
        <span class="tick"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5 9-10" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="text">One dashboard, one login</span>
      </div>
      <div class="check-item ci-2">
        <span class="tick"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5 9-10" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="text">Automatic ADO correlation</span>
      </div>
      <div class="check-item ci-3">
        <span class="tick"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5 9-10" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="text">Plain-language AI summary</span>
      </div>
      <div class="check-item ci-4">
        <span class="tick"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5 9-10" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="text">See the fix inline, no escalation</span>
      </div>
    </div>

    <div class="hero-stat">
      <div class="hero-before">Hours of manual review</div>
      <div class="hero-after">
        <span class="num">[X]</span>
        <span class="label">MINUTES PER RELEASE</span>
      </div>
    </div>
  </div>
</div>

<script>
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.getElementById('scene').classList.add('reduced-motion');
  }
</script>
